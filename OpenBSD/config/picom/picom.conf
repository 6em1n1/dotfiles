# Shadows
shadow = false;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Opacity
enable-client-opacity = true;
detect-client-opacity = true;

# Blur
blur:
{
  method = "gaussian";
  size = 10;
  deviation = 5.0;
};

# Corners
corner-radius = 10;
detect-rounded-corners = false;

# Backend
backend = "glx";
vsync = false;
unredir-if-possible = true;
# mark-wmwin-focused = true;
# mark-ovredir-focused = true;
# use-ewmh-active-win = true;
# detect-transient = true;
# detect-client-leader = true;
use-damage = false;
log-level = "warn";

# Daemon mode
daemon = true;

# Drag and drop
drag-and-drop = true;

