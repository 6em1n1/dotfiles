# General
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# Background
background {
    monitor =
    path = /home/gemini/Pictures/Wallpapers/arch-dark.png
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 0.95
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.3
}

# Input field
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.35
    dots_rounding = -1
    dots_center = true
    dots_color = rgb(a9b1d6)
    outer_color = rgb(7aa2f7)
    inner_color = rgba(090d31cc)
    font_color = rgb(a9b1d6)
    fade_on_empty = false
    fade_timeout = 1000
    font_family = Hack Nerd Font
    font_size = 15
    placeholder_text = <span foreground="##7e87b0">Enter Password</span>
    hide_input = false
    rounding = 10
    check_color = rgb(bb9af7)
    fail_color = rgb(f7768e)
    fail_text = <span foreground="##f7768e">$FAIL <b>($ATTEMPTS)</b></span>
    fail_transition = 300
    capslock_color = rgb(e0af68)
    numlock_color = -1
    bothlock_color = rgb(e0af68)
    invert_numlock = false
    swap_font_color = false
    position = 0, 0
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(7aa2f74d)
    shadow_boost = 1.2
}

# Status label
label {
    monitor =
    text = System Locked
    color = rgba(169, 177, 214, 0.55)
    font_size = 15
    font_family = Hack Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Caps Lock indicator
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/capslock.sh
    color = rgb(e0af68)
    font_size = 15
    font_family = Hack Nerd Font
    position = 0, 100
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(090d3199)
}
