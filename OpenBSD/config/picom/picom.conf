#====================================================#
# picom.conf (TokyoNight tuned for i3 + rofi + dunst)
#====================================================#

# Backend and rendering
backend = "glx";
vsync = true;
use-damage = true;
detect-client-opacity = true;
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;
unredir-if-possible = false;
log-level = "warn";

# Shadows
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.22;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#1f2335";

# Fading fallback (for opacity changes not covered by custom scripts)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Rounded corners
corner-radius = 12;

# Blur
blur:
{
  method = "gaussian";
  size = 8;
  deviation = 3.0;
};

# Global animations
animations = (
  {
    triggers = [ "open" ];
    preset = "appear";
    scale = 0.96;
    duration = 0.18;
  },
  {
    triggers = [ "close" ];
    preset = "disappear";
    scale = 0.96;
    duration = 0.18;
    suppressions = [ "open" ];
  },
  {
    triggers = [ "show" ];
    preset = "appear";
    scale = 1.00;
    duration = 0.10;
  },
  {
    triggers = [ "hide" ];
    preset = "disappear";
    scale = 1.00;
    duration = 0.10;
    suppressions = [ "show" ];
  },
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    duration = 0.18;
    suppressions = [ "open", "show", "close", "hide" ];
  },
  {
    triggers = [ "color" ];
    shadow-red = {
      curve = "cubic-bezier(0.22, 1.0, 0.36, 1.0)";
      duration = 0.18;
      start = "window-shadow-red-before";
      end = "window-shadow-red";
    };
    shadow-green = {
      curve = "cubic-bezier(0.22, 1.0, 0.36, 1.0)";
      duration = 0.18;
      start = "window-shadow-green-before";
      end = "window-shadow-green";
    };
    shadow-blue = {
      curve = "cubic-bezier(0.22, 1.0, 0.36, 1.0)";
      duration = 0.18;
      start = "window-shadow-blue-before";
      end = "window-shadow-blue";
    };
  }
);

# Window rules
rules = (
  # Keep fullscreen crisp and distraction-free
  {
    match = "fullscreen";
    corner-radius = 0;
    shadow = false;
    dim = 0.0;
    opacity = 1.0;
    unredir = true;
  },

  # Never decorate desktop/panel windows
  {
    match = "window_type = 'dock' || window_type = 'desktop'";
    shadow = false;
    blur-background = false;
    corner-radius = 0;
    dim = 0.0;
  },

  # Focus language: cyan glow on active windows
  {
    match = "window_type = 'normal' && (focused || group_focused)";
    shadow-color = "#0db9d7";
    opacity = 1.0;
    dim = 0.0;
  },
  {
    match = "window_type = 'normal' && !focused && !group_focused";
    shadow-color = "#1f2335";
    opacity = 0.90;
    dim = 0.12;
  },

  # Menus and tooltips: clear and fully visible
  {
    match = "window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'tooltip'";
    full-shadow = true;
    shadow = true;
    opacity = 1.0;
    dim = 0.0;
    corner-radius = 8;
  },

  # Rofi uses global open/close animations (appear/disappear)
  {
    match = "class_g = 'Rofi' || class_i = 'rofi'";
    corner-radius = 14;
    blur-background = true;
    full-shadow = true;
    opacity = 0.98;
  },

  # Notifications: subtle slide from the right
  {
    match = "window_type = 'notification' || class_g = 'Dunst'";
    corner-radius = 12;
    blur-background = true;
    full-shadow = true;
    opacity = 0.98;
    shadow-color = "#449dab";
    animations = (
      {
        triggers = [ "open", "show" ];
        preset = "slide-in";
        direction = "right";
        duration = 0.18;
      },
      {
        triggers = [ "close", "hide" ];
        preset = "slide-out";
        direction = "right";
        duration = 0.18;
      }
    );
  }
);

