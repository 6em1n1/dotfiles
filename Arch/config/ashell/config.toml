log_level = "warn"
outputs = "Active"
position = "Top"
app_launcher_cmd = "rofi -show drun -run-command 'uwsm app -- {cmd}'"

[modules]
left = [ [ "appLauncher", "Updates", "Workspaces" ] ]
center = [ "Tempo" ]
right = [ "Tray", "SystemInfo", [ "Privacy", "Settings" ] ]

[updates]
check_cmd = "checkupdates"
update_cmd = 'kitty -e zsh -c "sudo pacman -Syu; echo Done - Press enter to exit; read" &'
interval = 600

[workspaces]
enable_workspace_filling = true

[[CustomModule]]
name = "appLauncher"
icon = "󱗼"
command = "rofi -show drun -run-command 'uwsm app -- {cmd}'"

[window_title]
truncate_title_after_length = 100

[system_info]
indicators = [ "Cpu", "Memory", "Temperature" ]
interval = 1

[system_info.cpu]
warn_threshold = 75
alert_threshold = 90

[system_info.memory]
warn_threshold = 75
alert_threshold = 90

[system_info.disk]
warn_threshold = 75
alert_threshold = 90

[system_info.temperature]
warn_threshold = 75
alert_threshold = 90

[tempo]
clock_format = "%T"

[settings]
lock_cmd = "playerctl --all-players pause; hyprlock &"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueman-manager"
shutdown_cmd = "systemctl poweroff"
suspend_cmd = "systemctl suspend"
hibernate_cmd = "systemctl hibernate"
reboot_cmd = "systemctl reboot"
logout_cmd = "loginctl kill-user $(whoami)"
brightness_indicator_format = "Icon"
battery_format = "IconAndPercentage"
indicators = ["IdleInhibitor", "PowerProfile", "Network", "Vpn", "Bluetooth", "Brightness", "Microphone", "Audio", "Battery"]

[appearance]
style = "Islands"
scale_factor = 1.0
font_name = "Hack Nerd Font Mono"
opacity = 0.85
primary_color   = "#7aa2f7"
success_color   = "#9ece6a"
text_color      = "#c0d8ff"
workspace_colors         = [ "#7aa2f7", "#c0d8ff" ]
special_workspace_colors = [ "#7e87b0", "#d4baff" ]

[appearance.menu]
opacity = 0.92

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base   = "#090d31"
weak   = "#0d1138"
strong = "#1a1f4a"

[appearance.secondary_color]
base = "#bb9af7"
