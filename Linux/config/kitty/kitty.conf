# Font
font_family       Hack Nerd Font Mono
bold_font         Hack Nerd Font Mono Bold
italic_font       Hack Nerd Font Mono Italic
bold_italic_font  Hack Nerd Font Mono Bold Italic
font_size         10.0
disable_ligatures cursor
text_composition_strategy platform
undercurl_style thin-dense

# Window
background_opacity         0.85
dynamic_background_opacity yes
background_blur            32
confirm_os_window_close    0
remember_window_size       no
initial_window_width       110c
initial_window_height      30c
window_padding_width       5
single_window_padding_width 5
window_border_width        2pt
active_border_color        #7aa2f7
inactive_border_color      #1a1f4a
window_margin_width        0
hide_window_decorations    yes
draw_minimal_borders       yes
window_resize_step_cells   2
window_resize_step_lines   2
placement_strategy         center
inactive_text_alpha        0.85

# Cursor
cursor                      #7aa2f7
cursor_text_color           #090d31
cursor_shape                block
cursor_blink_interval       0.5
cursor_stop_blinking_after  15
cursor_trail                1
cursor_trail_decay          0.1 0.4
cursor_trail_start_threshold 2

# Scrolling
scrollback_lines        10000
wheel_scroll_min_lines  1
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait        2.0
url_color              #7dcfff
url_style              curly
detect_urls            yes
copy_on_select         yes
strip_trailing_spaces  smart
focus_follows_mouse    no

# Performance
repaint_delay   8
input_delay     2
sync_to_monitor yes

# Bell
enable_audio_bell    no
visual_bell_duration 0.1
visual_bell_color    #7aa2f7
window_alert_on_bell yes
bell_on_tab          "● "
command_on_bell      none

# Tab bar
tab_bar_style hidden

# Colors
foreground #a9b1d6
background #090d31

selection_foreground #ffffff
selection_background #7aa2f7

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #ff7a93

# Green
color2  #9ece6a
color10 #b9f27c

# Yellow
color3  #e0af68
color11 #ff9e64

# Blue
color4  #7aa2f7
color12 #7da6ff

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #0db9d7

# White
color7  #a9b1d6
color15 #c0caf5

# Extended
color16 #ff9e64
color17 #db4b4b

# Keybindings
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+f5     load_config_file
map ctrl+shift+r      load_config_file
map ctrl+plus         change_font_size all +1.0
map ctrl+equal        change_font_size all +1.0
map ctrl+minus        change_font_size all -1.0
map ctrl+0            change_font_size all 0
