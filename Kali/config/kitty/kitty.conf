# Font
font_family       		Hack Nerd Font Mono
bold_font         		Hack Nerd Font Mono Bold
italic_font       		Hack Nerd Font Mono Italic
bold_italic_font  		Hack Nerd Font Mono Bold Italic
font_size         		11.0
disable_ligatures 		cursor
text_composition_strategy 	platform
undercurl_style 		thin-dense

# Window
background_opacity         	0.85
dynamic_background_opacity 	no 
background_blur            	0
confirm_os_window_close    	0
remember_window_size       	no
window_padding_width       	4
single_window_padding_width 	4
window_border_width        	2pt
window_margin_width        	0
hide_window_decorations    	yes
draw_minimal_borders       	yes
window_resize_step_cells   	2
window_resize_step_lines   	2
placement_strategy         	center
inactive_text_alpha        	0.85

# Shell integration
shell_integration		no-cursor

# Cursor
cursor_shape                	block
cursor_shape_unfocused 		hollow
cursor_blink_interval      	0.5 ease-in-out
cursor_stop_blinking_after  	15.0
cursor_trail                	1
cursor_trail_decay          	0.1 0.4
cursor_trail_start_threshold 	2

# Scrolling
scrollbar			never
scrollback_lines        	10000
wheel_scroll_min_lines  	1
scrollback_pager        	less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait        		5.0
url_style              		curly
detect_urls            		yes
copy_on_select         		no
strip_trailing_spaces  		smart
focus_follows_mouse    		yes

# Performance
repaint_delay   		10
input_delay     		3
sync_to_monitor 		yes

# Bell
enable_audio_bell    		no
visual_bell_duration 		0.5
window_alert_on_bell 		yes
bell_on_tab          		"● "
command_on_bell      		none

# Tab bar
tab_bar_style 			hidden

# Colors
background #040115
foreground #d9ddf1
selection_background #2550a3
selection_foreground #ffffff
url_color #c0caf5
cursor #d9ddf1
cursor_text_color #040115
visual_bell_color #d9ddf1
active_border_color #2f66ca
inactive_border_color #0c0a28
active_tab_background #2f66ca
active_tab_foreground #ffffff
inactive_tab_background #08062d
inactive_tab_foreground #9491b2

